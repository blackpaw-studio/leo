name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        if: matrix.os == 'macos-latest'
        run: |
          total=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=45
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi

      - name: Upload coverage
        if: always() && matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run E2E tests
        run: go test -tags=e2e -v -count=1 ./e2e/...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      # Pin gosec to a known-good release. Bump deliberately after reviewing
      # release notes at https://github.com/securego/gosec/releases.
      - name: Install gosec
        env:
          GOSEC_VERSION: v2.25.0
        run: go install github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}

      - name: Security scan
        # G704 flags c.baseURL+path in internal/mcp/client.go as SSRF-taint,
        # but baseURL is Leo's own daemon endpoint (never user-supplied).
        run: gosec -quiet -exclude=G104,G204,G304,G306,G602,G702,G703,G704 ./...
