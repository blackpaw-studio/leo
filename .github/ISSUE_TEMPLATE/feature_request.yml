name: Feature request
description: Suggest a new capability or improvement
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check existing issues and the roadmap to see
        if this has already been discussed.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the user-facing pain, not the proposed implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you imagine this working? CLI shape, config shape, behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Existing workarounds, other tools, or designs you rejected.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art, related issues.
