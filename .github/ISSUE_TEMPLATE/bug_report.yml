name: Bug report
description: Something in Leo doesn't work as documented
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much of
        the template below as you can. If a field doesn't apply, leave it blank.

        For **security vulnerabilities**, please don't use this form — see
        [SECURITY.md](https://github.com/blackpaw-studio/leo/blob/main/SECURITY.md)
        for private reporting.

  - type: input
    id: version
    attributes:
      label: Leo version
      description: Output of `leo version`.
      placeholder: v0.3.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other (please specify in description)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what's wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `leo setup`
        2. Edit leo.yaml with …
        3. Run `leo service start`
        4. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / config
      description: |
        Output of `leo logs`, the offending section of `leo.yaml` (redact
        secrets), or anything else that might help. This will be
        automatically formatted as code.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I'm running a supported version (latest release)
          required: false
