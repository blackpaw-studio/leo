version: 2

builds:
  - main: ./cmd/leo
    binary: leo
    ldflags:
      - -s -w -X github.com/blackpaw-studio/leo/internal/cli.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: blackpaw-studio
      name: homebrew-tap
    name: leo
    homepage: https://github.com/blackpaw-studio/leo
    description: CLI for managing Claude Code agents as persistent personal assistants

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
