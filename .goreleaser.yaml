version: 2

builds:
  - main: ./cmd/leo
    binary: leo
    ldflags:
      - -s -w -X github.com/blackpaw-studio/leo/internal/cli.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Keyless signing of the checksums file via Sigstore cosign. Identity is
# bound to the GitHub Actions OIDC token for this workflow — no long-lived
# keys are stored anywhere. `leo update` verifies both the signature and
# the issuing identity before trusting checksums.txt.
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: leo
    repository:
      owner: blackpaw-studio
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/blackpaw-studio/leo"
    description: "Supervise persistent Claude Code agents with scheduling and channel plugins"
    license: MIT
    skip_upload: auto
    commit_author:
      name: goreleaser-bot
      email: bot@blackpaw.studio
    dependencies:
      - name: tmux
    caveats: |
      leo requires the `claude` CLI at runtime. Install it from:
        https://docs.claude.com/claude-code

      On first run, configure leo with:
        leo setup
    test: |
      assert_match "leo #{version}", shell_output("#{bin}/leo version")
