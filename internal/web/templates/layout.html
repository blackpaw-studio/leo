<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leo</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <form method="post" action="/logout" class="logout-form">
                <button type="submit" class="logout-btn" title="Sign out">Sign out</button>
            </form>
        </div>
        {{template "status.html" .}}
        {{template "processes.html" .}}
        <div id="flash-container"></div>
        <div class="tabs">
            <button class="tab active" hx-get="/partials/tasks" hx-target="#tab-content" hx-swap="innerHTML" onclick="setActiveTab(this)">Tasks</button>
            <button class="tab" hx-get="/partials/agents" hx-target="#tab-content" hx-swap="innerHTML" onclick="setActiveTab(this)">Agents</button>
            <button class="tab" hx-get="/partials/config/processes" hx-target="#tab-content" hx-swap="innerHTML" onclick="setActiveTab(this)">Manage Processes</button>
            <button class="tab" hx-get="/partials/config/tasks" hx-target="#tab-content" hx-swap="innerHTML" onclick="setActiveTab(this)">Manage Tasks</button>
            <button class="tab" hx-get="/partials/config/templates" hx-target="#tab-content" hx-swap="innerHTML" onclick="setActiveTab(this)">Manage Templates</button>
            <button class="tab" hx-get="/partials/config/settings" hx-target="#tab-content" hx-swap="innerHTML" onclick="setActiveTab(this)">Settings</button>
        </div>
        <div id="tab-content">
            {{template "tasks.html" .}}
        </div>
    </div>
    <script>
    function setActiveTab(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    function toggleHistory(el, name) {
        var target = document.getElementById('history-' + name);
        if (target.innerHTML.trim()) {
            target.innerHTML = '';
        } else {
            htmx.ajax('GET', '/partials/task/' + name + '/history', {target: target, swap: 'innerHTML'});
        }
    }
    function toggleLog(btn, name, file) {
        var row = btn.closest('tr').nextElementSibling;
        if (!row || !row.classList.contains('log-row')) return;
        var cell = row.querySelector('.log-cell');
        var expanded = btn.getAttribute('data-expanded') === 'true';
        if (expanded) {
            row.style.display = 'none';
            cell.innerHTML = '';
            btn.textContent = 'view log';
            btn.setAttribute('data-expanded', 'false');
        } else {
            row.style.display = '';
            btn.textContent = 'hide log';
            btn.setAttribute('data-expanded', 'true');
            htmx.ajax('GET', '/partials/task/' + name + '/log?file=' + encodeURIComponent(file), {target: cell, swap: 'innerHTML'});
        }
    }
    function confirmDelete(form) {
        if (confirm('Are you sure you want to delete this?')) {
            htmx.trigger(form, 'confirmed');
        }
    }
    </script>
</body>
</html>
