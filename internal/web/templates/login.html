{{define "login.html"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Leo — Login</title>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="login">
<main class="login-box">
  <h1>Leo</h1>
  <p class="muted">Paste the token from <code>~/.leo/state/api.token</code></p>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  <form method="post" action="/login" id="login-form">
    <input type="password" name="token" autocomplete="current-password" autofocus required>
    <button type="submit">Sign in</button>
  </form>
  {{if .AutoToken}}
  <script>
    document.querySelector('input[name=token]').value = {{.AutoToken}};
    document.getElementById('login-form').submit();
  </script>
  {{end}}
</main>
</body>
</html>
{{end}}
